<?xml version="1.0" encoding="UTF-8"?>
<!-- Handset official mark — full color in marketplace (edge-to-edge). -->
<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1a2744"/>
      <stop offset="1" stop-color="#0d1528"/>
    </linearGradient>
    <linearGradient id="arc" x1="28" y1="28" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5b9dff"/>
      <stop offset="1" stop-color="#3d7aef"/>
    </linearGradient>
    <linearGradient id="beam" x1="64" y1="64" x2="108" y2="28" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7ec8ff" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#5b9dff" stop-opacity="0.12"/>
    </linearGradient>
  </defs>
  <!-- Full bleed plate (fills marketplace badge edge-to-edge) -->
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>
  <rect x="1" y="1" width="126" height="126" rx="27" stroke="#2a3d66" stroke-width="2"/>
  <!-- Radar rings -->
  <circle cx="64" cy="64" r="42" stroke="url(#arc)" stroke-width="3.5" opacity="0.3"/>
  <circle cx="64" cy="64" r="29" stroke="url(#arc)" stroke-width="3.5" opacity="0.55"/>
  <circle cx="64" cy="64" r="16" stroke="url(#arc)" stroke-width="3.5" opacity="0.9"/>
  <!-- Sweep -->
  <path d="M64 64 L64 22 A42 42 0 0 1 102 48 Z" fill="url(#beam)"/>
  <!-- Core -->
  <circle cx="64" cy="64" r="7" fill="#8fd0ff"/>
  <circle cx="64" cy="64" r="3.5" fill="#e8f4ff"/>
  <!-- Blip -->
  <circle cx="94" cy="38" r="5" fill="#ffb454"/>
  <circle cx="94" cy="38" r="9" stroke="#ffb454" stroke-width="1.75" opacity="0.4"/>
</svg>
