<?xml version="1.0" encoding="UTF-8"?>
<!-- Malbork — concentric keep mark (full color, marketplace). Named for Malbork Castle. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="brick" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c45c3e"/>
      <stop offset="55%" stop-color="#8b3a2a"/>
      <stop offset="100%" stop-color="#5c2418"/>
    </linearGradient>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a2230"/>
      <stop offset="100%" stop-color="#0e1218"/>
    </linearGradient>
  </defs>
  <!-- plate -->
  <rect x="2" y="2" width="60" height="60" rx="12" fill="url(#sky)"/>
  <!-- outer curtain wall -->
  <path fill="url(#brick)" d="M10 48 V28 L16 22 H22 V18 H26 V22 H30 V18 H34 V22 H38 V18 H42 V22 H48 L54 28 V48 Z"/>
  <!-- battlements -->
  <path fill="#a34a32" d="M16 22h4v-4h4v4h4v-4h4v4h4v-4h4v4h4v-4h2v6H14v-6h2z"/>
  <!-- keep -->
  <rect x="24" y="26" width="16" height="22" fill="#6e2e1e"/>
  <path fill="#8b3a2a" d="M22 26 L32 16 L42 26 Z"/>
  <!-- keep windows -->
  <rect x="28" y="32" width="3" height="5" rx="0.5" fill="#1a1814"/>
  <rect x="33" y="32" width="3" height="5" rx="0.5" fill="#1a1814"/>
  <!-- gate -->
  <path fill="#1a1814" d="M29 40 h6 v8 h-6 z"/>
  <path fill="#c9b27a" d="M30.5 44 h1 v2 h-1 z" opacity="0.7"/>
  <!-- moat hint -->
  <ellipse cx="32" cy="52" rx="20" ry="3" fill="#2a4060" opacity="0.45"/>
</svg>
